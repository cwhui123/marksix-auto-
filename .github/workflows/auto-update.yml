name: Auto Update Mark Six

on:
  schedule:
    # Runs daily at 22:30 Hong Kong time (UTC 14:30)
    - cron: "30 14 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas openpyxl requests beautifulsoup4

      - name: Update Mark Six data
        run: |
          python update_marksix.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto update Mark Six data" || echo "No changes to commit"
          git push
